<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>

  <!-- Viewport: cover safe areas for notch/home-indicator devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

  <!-- Primary Meta -->
  <title>NeetBand — Study Smarter. Remember More.</title>
  <meta name="description" content="Auditory learning for NEET aspirants. Biology, Chemistry & Physics through music-based memory techniques. Study anywhere, even offline."/>
  <meta name="application-name" content="NeetBand"/>
  <meta name="generator" content="Vite + React"/>

  <!-- Theme color (dark + light mode variants) -->
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#07122d"/>
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ecc246"/>

  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json"/>

  <!-- PWA: standalone launch (no browser chrome) -->
  <meta name="mobile-web-app-capable" content="yes"/>

  <!-- iOS / iPadOS specific -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="NeetBand"/>

  <!-- iOS touch icons (for Add to Home Screen) -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png"/>

  <!-- Standard favicon chain -->
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png"/>
  <link rel="shortcut icon" href="/icons/icon-192x192.png"/>

  <!-- Open Graph / Social sharing -->
  <meta property="og:type"        content="website"/>
  <meta property="og:url"         content="https://neetband.app/"/>
  <meta property="og:title"       content="NeetBand — Study Smarter. Remember More."/>
  <meta property="og:description" content="Auditory learning for NEET aspirants. Biology, Chemistry & Physics through music-based memory techniques."/>
  <meta property="og:image"       content="/icons/icon-512x512.png"/>

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image"/>
  <meta name="twitter:title"       content="NeetBand — Study Smarter. Remember More."/>
  <meta name="twitter:description" content="Auditory learning for NEET aspirants. Study anywhere, even offline."/>
  <meta name="twitter:image"       content="/icons/icon-512x512.png"/>

  <!-- KaTeX for LaTeX Math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <!-- Early theme init — prevents FOUC -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (theme === 'dark' || (!theme && prefersDark)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
</head>
<body class="bg-background text-on-background font-body-md antialiased overflow-x-hidden pt-xl md:pb-24 pb-36">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
